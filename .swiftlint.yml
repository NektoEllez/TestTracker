# FinanceTracker local SwiftLint config
# Goal: project-wide quality checks with practical thresholds.

included:
  - FinanceTracker

excluded:
  - build
  - DerivedData
  - .git
  - FinanceTracker.xcodeproj

disabled_rules:
  - todo
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - array_init
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - first_where
  - force_cast
  - force_try
  - force_unwrapping
  - implicit_return
  - indentation_width
  - joined_default_parameter
  - last_where
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - reduce_boolean
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - yoda_condition

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 380
  error: 520
  ignore_comment_only_lines: true

type_body_length:
  warning: 260
  error: 380

function_body_length:
  warning: 45
  error: 80

closure_body_length:
  warning: 35
  error: 80

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 10
  error: 15

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 4
    error: 6

indentation_width:
  indentation_width: 4
  include_comments: false

large_tuple:
  warning: 3
  error: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - vm
    - vc

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

force_unwrapping:
  severity: warning

force_cast:
  severity: warning

force_try:
  severity: warning

custom_rules:
  no_dispatch_queue_main:
    name: "No DispatchQueue.main"
    regex: "DispatchQueue\\.main\\.(async|sync)\\s*\\{"
    message: "Use @MainActor or await MainActor.run { } instead of DispatchQueue.main.async"
    severity: warning

  no_task_detached:
    name: "Avoid Task.detached"
    regex: "Task\\.detached\\s*[\\(\\{]"
    message: "Task.detached breaks structured concurrency and cancellation. Prefer Task { }."
    severity: warning

  no_dispatch_semaphore:
    name: "No DispatchSemaphore"
    regex: "DispatchSemaphore\\("
    message: "Avoid blocking with DispatchSemaphore in Swift Concurrency code."
    severity: warning

  no_dispatch_group_wait:
    name: "No DispatchGroup.wait"
    regex: "DispatchGroup\\s*\\("
    message: "Prefer TaskGroup/async let instead of DispatchGroup for async coordination."
    severity: warning

  no_unchecked_sendable:
    name: "No @unchecked Sendable"
    regex: "@unchecked\\s+Sendable"
    message: "Avoid @unchecked Sendable unless you have a strong safety proof."
    severity: warning

  no_userdefaults_token:
    name: "No token/secret in UserDefaults"
    regex: 'UserDefaults\.standard\.set\([^,]+,\s*forKey:\s*"(auth|token|password|secret|key|credential|pin)[^"]*"'
    message: "Store sensitive data in Keychain, not UserDefaults."
    severity: error

  no_hardcoded_secret:
    name: "No hardcoded API key/token"
    regex: '(apiKey|api_key|APIKey|secretKey|authToken|accessToken)\\s*=\\s*"[A-Za-z0-9_\\-]{16,}"'
    message: "Hardcoded secret detected. Use Secrets.xcconfig or secure injection."
    severity: error

  no_print_statement:
    name: "Use Logger instead of print"
    regex: "^\\s*print\\("
    message: "Use Logger/os_log and guard debug logs with #if DEBUG."
    severity: warning

  no_any_view:
    name: "Avoid AnyView in performance-sensitive paths"
    regex: "\\bAnyView\\s*\\("
    message: "Prefer concrete View types to preserve SwiftUI diffing performance."
    severity: warning
